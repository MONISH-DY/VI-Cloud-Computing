<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudVault - Secure Cloud Storage</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=2">
</head>
<body>

    <!-- Animated Background Shapes -->
    <div class="auth-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="auth-container" style="text-align: center; max-width: 600px; padding: 60px 40px;">
        <div class="auth-logo" style="margin-bottom: 24px;">
            <i class="fas fa-cloud-upload-alt" style="font-size: 72px;"></i>
        </div>
        
        <h1 class="auth-title" style="font-size: 48px; margin-bottom: 16px;">CloudVault</h1>
        <p class="auth-subtitle" style="font-size: 18px; line-height: 1.6; margin-bottom: 40px;">
            Secure, lightning-fast cloud storage powered by Azure. Store, share, and collaborate from anywhere.
        </p>

        <div style="display: flex; gap: 16px; justify-content: center;">
            <a href="{{ url_for('auth.login') }}" class="btn-auth" style="width: auto; padding: 16px 32px; font-size: 18px;">Sign In</a>
            <a href="{{ url_for('auth.register') }}" class="btn-auth" style="width: auto; padding: 16px 32px; font-size: 18px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);">Create Account</a>
        </div>
    </div>

</body>
</html>
