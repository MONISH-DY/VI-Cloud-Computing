<div id="aiModal" class="modal">
    <div class="modal-content" style="max-width: 600px; max-height: 85vh; display: flex; flex-direction: column;">
        <div class="modal-header">
            <h2><i class="fas fa-robot text-primary"></i> AI Smart Insights</h2>
            <button class="close-btn" onclick="closeAIModal()">&times;</button>
        </div>
        <div class="modal-body" id="aiModalBody" style="overflow-y: auto; flex: 1; padding-right: 8px;">
            <div id="aiLoading" class="ai-loading hidden">
                <div class="spinner"></div>
                <p>Analyzing your file with Azure GenAI...</p>
            </div>
            <div id="aiContent" class="ai-content">
                <h3 id="aiFilename" style="margin-bottom: 16px; color: var(--text-primary);">File Name</h3>
                
                <div class="ai-section">
                    <h4><i class="fas fa-align-left"></i> Summary</h4>
                    <p id="aiSummaryText">Summary will appear here...</p>
                </div>

                <div class="ai-section">
                    <h4><i class="fas fa-tags"></i> Key Topics</h4>
                    <div id="aiTagsContainer" class="tag-cloud">
                        <!-- Tags will be injected here -->
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeAIModal()">Close</button>
        </div>
    </div>
</div>

<style>
    .ai-section {
        margin-bottom: 24px;
        padding: 16px;
        background: var(--bg-secondary);
        border-radius: 8px;
        border-left: 4px solid var(--primary-color);
    }
    .ai-section h4 {
        margin-bottom: 8px;
        font-size: 14px;
        text-transform: uppercase;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
    }
    #aiSummaryText {
        line-height: 1.6;
        color: var(--text-primary);
    }
    .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
    }
    .ai-tag {
        background: var(--primary-light);
        color: var(--primary-color);
        padding: 4px 12px;
        border-radius: 16px;
        font-size: 12px;
        font-weight: 500;
    }
    .ai-loading {
        text-align: center;
        padding: 40px 0;
    }
    .spinner {
        border: 4px solid rgba(0, 0, 0, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: var(--primary-color);
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
